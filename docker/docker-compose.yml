version: "3.9"

# ─────────────────────────────────────────────────────────────
#  LLM-Augmented Web Scraping Platform — Local Development Stack
#  Kafka: KRaft mode (no Zookeeper)
#  PostgreSQL 18, Elasticsearch 8.11.3, MinIO, Redis, pgAdmin
# ─────────────────────────────────────────────────────────────

x-common-env: &common-env
  POSTGRES_DSN: postgresql://scraper:scraper@postgres:5432/scraperdb
  KAFKA_BROKERS: kafka:29092
  ELASTICSEARCH_URL: http://elasticsearch:9200
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  REDIS_URL: redis://redis:6379/0
  LLM_BASE_URL: http://ollama:11434/v1
  LOG_FORMAT: console
  LOG_LEVEL: INFO

services:

  # ── Infrastructure ─────────────────────────────────────────

  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: scraper
      POSTGRES_DB: scraperdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper"]
      interval: 5s
      timeout: 5s
      retries: 10

  # KRaft mode: single-node broker + controller (no Zookeeper)
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"   # external / host access
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # 29092 = internal (docker-to-docker), 9092 = external (host), 9093 = controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--list", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.3
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_SECURITY_ENABLED: "false"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ── Application Services ────────────────────────────────────
  # Build with: make build
  # Run with:   make dev

  llm_api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.llm_api
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-5}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_BASE_URL: http://ollama:11434/v1
      LLM_MODEL: ${LLM_MODEL:-qwen2.5-coder:7b}
      LLM_API_KEY: ollama
      LLM_API_PORT: 8000
      LLM_API_WORKERS: 2
      METRICS_PORT: 9090
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.scheduler
    environment:
      <<: *common-env
      SCHEDULER_INTERVAL_SECONDS: 60
      METRICS_PORT: 9090
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  scraper:
    build:
      context: ..
      dockerfile: docker/Dockerfile.scraper
    environment:
      <<: *common-env
      NODE_ID: scraper-node-001
      SCRAPER_MAX_PAGES: 50
      SCRAPER_DELAY_MIN: 1.0
      SCRAPER_DELAY_MAX: 3.0
      SCRAPER_CONCURRENCY: 3
      SCRAPER_USE_PROXIES: "false"
      SCRAPER_USE_HEADLESS: "false"
      METRICS_PORT: 9090
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  processing:
    build:
      context: ..
      dockerfile: docker/Dockerfile.processing
    environment:
      <<: *common-env
      ELASTICSEARCH_INDEX: scraped_articles
      METRICS_PORT: 9090
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  kafka_data:
  es_data:
  minio_data:
  redis_data:
  pgadmin_data:
  ollama_data:
